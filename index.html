<script>

let step = parseInt(localStorage.getItem("step")) || 0;
let xp = parseInt(localStorage.getItem("xp")) || 0;
let fails = {};
let lang = "en";

const ranks = ["👶 Beginner","🧠 Learner","⚡ Coder","🔥 Developer","🚀 Pro Dev"];

function getRank(){
 let r = Math.floor(xp/50);
 return ranks[Math.min(r, ranks.length-1)];
}

const lessons = [
{
t:"Plugin Basics",
concept:"plugin",
kid:"Plugin = game superpower 🎮",
dev:"plugin.yml defines plugin identity",
code:`name: PluginName`,
q:"What is plugin used for?",
options:[
 {t:"Add features to server",hint:"Plugins extend server functionality"},
 {t:"Delete Minecraft",hint:"Plugins don't destroy the game"},
 {t:"Change phone battery",hint:"Plugin works inside server, not phone"}
 ],
a:0
},
{
t:"onEnable()",
concept:"enable",
kid:"Plugin wakes up 🚀",
dev:"Runs when plugin starts",
code:`onEnable(){}`,
q:"When does onEnable run?",
options:[
 {t:"When plugin starts",hint:"It runs at startup"},
 {t:"When server stops",hint:"Stopping uses onDisable"},
 {t:"Random time",hint:"It is predictable"}
 ],
a:0
},
{
t:"Events",
concept:"event",
kid:"Game event = something happens ⚡",
dev:"Triggered automatically",
code:`PlayerJoinEvent`,
q:"Event runs when?",
options:[
 {t:"Automatically",hint:"Events trigger by actions"},
 {t:"Only manually",hint:"You don't manually run events"},
 {t:"Never",hint:"Events always run"}
 ],
a:0
},
{
t:"Commands",
concept:"command",
kid:"Type to control 🎯",
dev:"Handles player input",
code:`/test`,
q:"Which is a command?",
options:[
 {t:"/test",hint:"Commands start with /"},
 {t:"run()",hint:"That is a function"},
 {t:"123",hint:"Numbers are not commands"}
 ],
a:0
},
{
t:"Config",
concept:"config",
kid:"Save data 📦",
dev:"Stores settings",
code:`getConfig()`,
q:"Config is used for?",
options:[
 {t:"Saving data",hint:"Correct use"},
 {t:"Deleting files",hint:"Not its job"},
 {t:"Crashing server",hint:"Wrong purpose"}
 ],
a:0
},
{
t:"Tasks",
concept:"task",
kid:"Do later ⏳",
dev:"Runs after delay",
code:`scheduleTask`,
q:"Task runs?",
options:[
 {t:"After time",hint:"Delayed execution"},
 {t:"Before start",hint:"That is not delay"},
 {t:"Never",hint:"Tasks do run"}
 ],
a:0
}
];

function show(id){
 document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function render(){
 let html=`
 <div class="card">
 <h3>🏆 XP: ${xp}</h3>
 <h3>🎖 Rank: ${getRank()}</h3>
 </div>
 `;

 lessons.forEach((l,i)=>{
 let lock=i>step;

 html+=`
 <div class="card">
 <h3>Level ${i+1}: ${l.t}</h3>

 <p>👶 ${l.kid}</p>
 <p>🧑‍💻 ${l.dev}</p>

 <div class="code">${l.code}</div>

 <p>🤖 ${l.q}</p>

 ${l.options.map((opt,idx)=>`
 <button class="action" ${lock?'disabled':''}
 onclick="check(${i},${idx})">
 ${opt.t}
 </button>
 `).join("<br>")}

 <div id="hint${i}" style="margin-top:8px;color:#facc15;"></div>
 </div>`;
 });

 document.getElementById("content").innerHTML=html;
 document.getElementById("bar").style.width=(step/lessons.length*100)+"%";
}

function check(i,ans){

 if(!fails[i]) fails[i]=0;

 if(ans===lessons[i].a){

  if(i===step){
   xp+=10;
   step++;
   localStorage.setItem("step",step);
   localStorage.setItem("xp",xp);

   document.getElementById("hint"+i).innerText="✅ Correct! +10 XP";
   render();
  }

 }else{

  fails[i]++;

  let smartHint = lessons[i].options[ans].hint;

  if(fails[i]===1){
   document.getElementById("hint"+i).innerText="❌ Hint: "+smartHint;
  }
  else if(fails[i]===2){
   document.getElementById("hint"+i).innerText="⚠️ Think again: "+lessons[i].dev;
  }
  else{
   document.getElementById("hint"+i).innerText="💡 Answer is: "+lessons[i].options[lessons[i].a].t;
  }
 }

}

function reset(){
 localStorage.clear();
 step=0;
 xp=0;
 fails={};
 render();
}

render();

</script>
