<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGGAMING Dev Academy</title>

<style>
body{margin:0;font-family:'Segoe UI';background:#020617;color:white;}
header{background:linear-gradient(90deg,#22c55e,#3b82f6);padding:15px;text-align:center;font-size:22px;}
nav{display:flex;justify-content:center;gap:8px;padding:10px;background:#0f172a;flex-wrap:wrap;}
nav button{padding:8px 12px;border:none;border-radius:6px;background:#3b82f6;color:white;}

.section{display:none;padding:20px;}
.active{display:block;}

.card{
 background:rgba(255,255,255,0.05);
 backdrop-filter:blur(12px);
 padding:15px;margin:12px 0;border-radius:12px;
}

.code{
 background:#000;padding:12px;border-radius:8px;
 font-family:monospace;color:#22c55e;
 overflow:auto;font-size:13px;
}

button.action{
 padding:8px 12px;border:none;border-radius:6px;
 background:#22c55e;color:white;margin-top:10px;
 cursor:pointer;
}

.progress{background:#333;border-radius:10px;margin-bottom:10px;}
.bar{height:15px;background:#22c55e;width:0%;}

footer{text-align:center;padding:10px;background:#000;}
</style>
</head>

<body>

<header>🚀 SGGAMING GOD+ Dev Academy</header>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('course')">Course</button>
<button onclick="show('generator')">Generator</button>
<button onclick="reset()">Reset</button>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('bn')">বাংলা</button>
<button onclick="setLang('hi')">हिंदी</button>
</nav>

<!-- HOME -->
<div id="home" class="section active">
<h2>🎮 Learn Minecraft Plugin Coding</h2>
<p>Kid → Beginner → Developer 🚀</p>
</div>

<!-- COURSE -->
<div id="course" class="section">
<h3>📊 Progress</h3>
<div class="progress"><div id="bar" class="bar"></div></div>
<div id="content"></div>
</div>

<!-- GENERATOR -->
<div id="generator" class="section">
<h2>📦 Plugin Generator</h2>

<div class="card">
<input id="pname" placeholder="Plugin Name"><br><br>
<input id="author" placeholder="Author Name"><br><br>

<button class="action" onclick="generate()">Generate Plugin</button>

<div class="code" id="output"></div>
</div>
</div>

<footer>© SGGAMING</footer>

<script>

let step = localStorage.getItem("step") || 0;
let lang = "en";

const lessons = [

{
title:"Introduction",
desc:"Plugins are like superpowers for Minecraft server.",
code:`name: PluginName
author: You
version: 1.0
main: YourName\\Main`,
q:"Plugin adds power?",
a:"yes"
},

{
title:"Basic Plugin",
desc:"Every plugin starts with PHP and PluginBase.",
code:`<?php
namespace YourName;

use pocketmine\\plugin\\PluginBase;

class Main extends PluginBase{

 public function onEnable(){
  $this->getLogger()->info("Plugin Enabled");
 }

}`,
q:"Enable means start?",
a:"yes"
},

{
title:"Events",
desc:"Events run automatically when something happens.",
code:`use pocketmine\\event\\player\\PlayerJoinEvent;

public function onJoin(PlayerJoinEvent $event){
 $player = $event->getPlayer();
 $this->getServer()->broadcastMessage("Player Joined!");
}`,
q:"Event auto runs?",
a:"yes"
},

{
title:"Commands",
desc:"Commands allow players to control things.",
code:`public function onCommand($sender,$cmd,$label,$args){
 if($cmd->getName()=="test"){
  $sender->sendMessage("Hello!");
 }
}`,
q:"Command is /test?",
a:"yes"
},

{
title:"Config",
desc:"Config stores data for plugin.",
code:`$this->saveDefaultConfig();
$key = $this->getConfig()->get("key");`,
q:"Config stores data?",
a:"yes"
},

{
title:"Tasks",
desc:"Tasks run after time.",
code:`$this->getScheduler()->scheduleDelayedTask($task,200);`,
q:"Task runs later?",
a:"yes"
},

{
title:"Final",
desc:"You are now a developer 🚀",
code:`Build your own plugin now!`,
q:"You are dev?",
a:"yes"
}

];

function show(id){
 document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function render(){
 let html="";
 lessons.forEach((l,i)=>{
 let lock=i>step;

 html+=`
 <div class="card">
 <h3>Level ${i+1}: ${l.title}</h3>
 <p>${l.desc}</p>

 <div class="code">${l.code}</div>

 <p>🤖 ${l.q}</p>
 <input id="a${i}">
 <button class="action" ${lock?'disabled':''} onclick="check(${i})">
 ${lock?'🔒 Locked':'Submit'}
 </button>

 <div id="hint${i}"></div>
 </div>`;
 });

 document.getElementById("content").innerHTML=html;
 document.getElementById("bar").style.width=(step/lessons.length*100)+"%";
}

function check(i){
 let v=document.getElementById("a"+i).value.toLowerCase();
 if(v==lessons[i].a){
 if(i==step){
 step++;
 localStorage.setItem("step",step);
 alert("🚀 Level Complete!");
 render();
 }
 }else{
 document.getElementById("hint"+i).innerText="🤖 Think simple!";
 }
}

function setLang(l){lang=l;}

function reset(){localStorage.clear();step=0;render();}

function generate(){
 let name=document.getElementById("pname").value||"MyPlugin";
 let author=document.getElementById("author").value||"SG";

 let code=
`name: ${name}
author: ${author}
version: 1.0
main: ${author}\\Main

<?php
namespace ${author};

use pocketmine\\plugin\\PluginBase;

class Main extends PluginBase{
 public function onEnable(){
  $this->getLogger()->info("${name} Enabled");
 }
}`;

 document.getElementById("output").innerText=code;
}

render();

</script>

</body>
</html>
